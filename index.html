<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>학급 자리배치 티켓팅</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- 1. 로그인 화면 -->
<div id="login-view" class="view">
  <div class="card">
    <h2>🎟 자리배치 티켓팅</h2>
    <input id="student-id" type="number" placeholder="번호 (1~29)" min="1" max="29"/>
    <input id="student-pw" type="password" placeholder="비밀번호"/>
    <button id="btn-login">입장</button>
    <p id="login-error" class="error-text"></p>
  </div>
</div>

<!-- 2. 대기 화면 -->
<div id="wait-view" class="view hidden">
  <div class="card">
    <h2>⏳ 대기 중</h2>
    <p>선생님이 시작 버튼을 누를 때까지 기다리세요.</p>
    <p>번호: <span id="wait-id"></span></p>
    <button id="btn-logout-wait" class="secondary">다른 번호로 로그인</button>
  </div>
</div>

<!-- 3. 티켓팅 화면 -->
<div id="main-view" class="view hidden">
  <div class="card wide">
    <h2>🪑 좌석 선택</h2>
    <div id="classroom-layout" class="classroom-container">
      <div class="blackboard">칠 판 (Screen)</div>
      <div class="main-area">
        <div class="side-area window-side">
          <span>창</span><span>문</span>
        </div>
        <div id="seat-container" class="seat-grid">
          <!-- JS가 이곳에 좌석을 렌더링합니다 -->
        </div>
        <div class="side-area door-side">
          <span>복</span><span>도</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 4. 인증 모달 -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>좌석 확정</h3>
    <p>인증 단어를 입력하세요</p>
    <p class="captcha-box" id="captcha-text">---</p>
    <input id="captcha-input" type="text" placeholder="단어 입력"/>
    <button id="btn-confirm">확정</button>
    <button id="btn-cancel" class="secondary">취소</button>
  </div>
</div>

<!-- 5. 결과 화면 -->
<div id="result-view" class="view hidden">
  <div class="card wide">
    <h2>✅ 선택 완료</h2>
    <p>최종 결과를 기다리세요.</p>
    <div id="final-seat"></div>
    <button id="btn-logout-result" class="secondary">다른 번호로 로그인</button>
  </div>
</div>

<script src="firebase.js"></script>
<script src="student.js"></script>
</body>
</html>
