<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>관리자 - 자리배치</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>

<body>

<!-- =========================
  1. 관리자 로그인
========================= -->
<div id="admin-login-view" class="view">
  <div class="card">
    <h2>👨‍🏫 관리자 로그인</h2>

    <input id="admin-pw" type="password" placeholder="관리자 비밀번호"/>

    <button id="btn-admin-login">로그인</button>

    <p id="admin-login-error" class="error-text"></p>
  </div>
</div>

<!-- =========================
  2. 관리자 패널
========================= -->
<div id="admin-view" class="view hidden">
  <div class="card wide">

    <h2>📊 관리자 패널</h2>

    <!-- [추가된 기능] 학생 계정 관리 패널 -->
    <div class="panel">
      <h3>👥 학생 계정 생성 및 초기화</h3>
      <p style="font-size: 0.9rem; color: #666; margin-bottom: 100px;">버튼을 누르면 1번부터 29번까지의 학생 계정(비밀번호 포함)이 자동 생성됩니다.</p>
      <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <input id="default-student-pw" type="text" placeholder="공통 초기 비밀번호 입력 (예: 0000)" style="margin: 0; flex: 1;"/>
        <button id="btn-generate-students" style="background-color: #28a745; white-space: nowrap;">1~29번 자동 생성</button>
      </div>
      <div id="admin-student-list-manage" style="max-height: 150px; overflow-y: auto; background: #f8f9fa; padding: 10px; border-radius: 5px; font-size: 0.85rem;">
        <!-- 여기에 생성된 학생들의 번호와 비밀번호 리스트가 뜹니다 -->
        등록된 학생이 없습니다. 먼저 생성해 주세요.
      </div>
    </div>

    <!-- 인증 단어 관리 -->
    <div class="panel">
      <h3>🔐 인증 단어 설정</h3>
      <input id="captcha-admin" type="text" placeholder="예: 자리확정"/>
      <button id="btn-set-captcha">적용</button>
      <p id="captcha-status"></p>
    </div>

    <!-- 게임 제어 -->
    <div class="panel">
      <h3>🎮 티켓팅 제어</h3>
      <button id="btn-start">▶ 시작</button>
      <button id="btn-end">⏹ 종료</button>
      <button id="btn-reset">🔄 전체 초기화 (자리 리셋)</button>
    </div>

    <!-- 접속 현황 -->
    <div class="panel">
      <h3>🟢 실시간 접속 현황</h3>
      <p id="connect-count">0 / 29</p>
      <div id="student-list"></div>
    </div>

    <!-- 좌석 현황 (학생 화면과 대칭되도록 구조 보강) -->
    <div class="panel">
      <h3>🪑 실시간 좌석 현황 (모니터링)</h3>
      
      <!-- 칠판 영역 -->
      <div class="blackboard">🖥️ 칠 판 (FRONT)</div>

      <!-- 교실 전체 레이아웃 (창문, 좌석, 복도) -->
      <div class="classroom-layout">
        <!-- 왼쪽 창문 -->
        <div class="window-side">🪟 창문</div>
        
        <!-- 실시간으로 학생들의 선택 결과가 업데이트되는 좌석 그리드 -->
        <div id="admin-seat-grid" class="seat-grid"></div>
        
        <!-- 오른쪽 복도 -->
        <div class="corridor-side">🚪 복도</div>
      </div>
    </div>

  </div>
</div>

<script src="firebase.js"></script>
<script src="admin.js"></script>

</body>
</html>
