<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>관리자 - 자리배치</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- 1. 관리자 로그인 -->
<div id="admin-login-view" class="view">
  <div class="card">
    <h2>👨‍🏫 관리자 로그인</h2>
    <input id="admin-pw" type="password" placeholder="관리자 비밀번호"/>
    <button id="btn-admin-login">로그인</button>
    <p id="admin-login-error" class="error-text"></p>
  </div>
</div>

<!-- 2. 관리자 패널 -->
<div id="admin-view" class="view hidden">
  <div class="card wide">
    <h2>📊 관리자 패널</h2>

    <!-- 인증 단어 -->
    <div class="panel">
      <h3>🔐 인증 단어</h3>
      <input id="captcha-admin" type="text" placeholder="예: 자리확정"/>
      <button id="btn-set-captcha">적용</button>
      <p id="captcha-status"></p>
    </div>

    <!-- 게임 제어 -->
    <div class="panel">
      <h3>🎮 게임 제어</h3>
      <button id="btn-start">▶ 시작</button>
      <button id="btn-end">⏹ 종료</button>
      <button id="btn-reset" class="secondary">🔄 초기화</button>
    </div>

    <!-- 접속 현황 -->
    <div class="panel">
      <h3>👥 접속 현황</h3>
      <p id="connect-count">0 / 29</p>
      <div id="student-list"></div>
    </div>

    <!-- 좌석 현황 -->
    <div class="panel">
      <h3>🪑 좌석 현황 (클릭하면 좌석 잠금/해제)</h3>
      <div class="classroom-container">
        <div class="blackboard">칠 판 (Screen)</div>
        <div class="main-area">
          <div class="side-area window-side"><span>창</span><span>문</span></div>
          <div id="admin-seat-grid" class="seat-grid"></div>
          <div class="side-area door-side"><span>복</span><span>도</span></div>
        </div>
      </div>
    </div>

    <!-- 학생 비밀번호 일괄 관리 (자주 안 쓰는 기능이라 접어둠) -->
    <details class="panel">
      <summary style="cursor:pointer; font-weight:bold; font-size:1rem;">🔑 학생 비밀번호 일괄 관리</summary>
      <div style="margin-top:12px;">
        <button id="btn-download-csv" class="secondary">현재 비밀번호 CSV 다운로드</button>
        <input id="csv-upload" type="file" accept=".csv"/>
        <button id="btn-apply-csv">CSV 적용</button>
        <p id="csv-status" class="error-text"></p>
        <p style="font-size:12px; color:#666; text-align:left; margin-top:4px;">
          형식: 한 줄에 "번호,비밀번호" (예: 1,1234). 다운로드한 파일을 엑셀/메모장으로 수정 후 다시 업로드하세요.
        </p>
      </div>
    </details>

  </div>
</div>

<script src="firebase.js"></script>
<script src="admin.js"></script>
</body>
</html>
